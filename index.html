<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jackal Systems · Network Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg: #0a0e17;
            --accent-start: #9b00ff;
            --accent-end: #00f0ff;
            --glow: rgba(0, 240, 255, 0.3);
            --text-primary: #e8edf4;
            --border: #1e2638;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }

        .container {
            text-align: center;
        }

        .logo svg {
            width: 380px;
            height: 380px;
            filter: drop-shadow(0 0 30px var(--glow));
            animation: aura 4s ease-in-out infinite alternate;
        }

        @keyframes aura {
            0% {
                filter: drop-shadow(0 0 20px var(--glow));
            }

            100% {
                filter: drop-shadow(0 0 50px var(--accent-end));
            }
        }

        path,
        rect,
        line,
        circle {
            fill: none;
            stroke: url(#gradient);
            stroke-width: 1.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .node {
            fill: url(#gradient);
            animation: pulse 2.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.3;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.4);
            }
        }

        .scan-line {
            stroke: url(#gradient);
            stroke-width: 2;
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% {
                transform: translateY(-3px);
            }

            50% {
                transform: translateY(3px);
            }

            100% {
                transform: translateY(-3px);
            }
        }

        .hud-ring {
            animation: rotate-ring 60s linear infinite;
            transform-origin: 75px 75px;
        }

        @keyframes rotate-ring {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 700;
            margin-top: 1rem;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-end));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav {
            margin-top: 3rem;
        }

        a {
            display: block;
            padding: 1.2rem;
            margin: 1rem auto;
            width: 250px;
            border: 1px solid var(--border);
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            color: var(--text-primary);
            transition: 0.3s;
        }

        a:hover {
            border-color: var(--accent-end);
            box-shadow: 0 0 20px var(--glow);
            background: rgba(30, 30, 50, 0.5);
        }
    </style>
</head>

<body>

    <svg width="0" height="0">
        <defs>
            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#9b00ff" />
                <stop offset="100%" stop-color="#00f0ff" />
            </linearGradient>
        </defs>
    </svg>

    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 150 150">
                <!-- HUD Rings -->
                <circle class="hud-ring" cx="75" cy="75" r="65" stroke="url(#gradient)" stroke-width="1.2" fill="none"
                    stroke-dasharray="4 4" />
                <circle class="hud-ring" cx="75" cy="75" r="50" stroke="url(#gradient)" stroke-width="1" fill="none"
                    stroke-dasharray="3 3" />
                <circle class="hud-ring" cx="75" cy="75" r="35" stroke="url(#gradient)" stroke-width="0.8" fill="none"
                    stroke-dasharray="2 2" />

                <!-- Central CPU -->
                <rect x="60" y="60" width="30" height="30" stroke="url(#gradient)" stroke-width="2" rx="3" ry="3" />
                <line class="scan-line" x1="60" y1="75" x2="90" y2="75" />

                <!-- Symmetric network wireframe -->
                <!-- Top Left Cluster -->
                <line x1="60" y1="60" x2="40" y2="40" />
                <line x1="60" y1="60" x2="50" y2="35" />
                <line x1="50" y1="35" x2="30" y2="20" />
                <circle class="node" cx="40" cy="40" r="2" />
                <circle class="node" cx="50" cy="35" r="2" />
                <circle class="node" cx="30" cy="20" r="2" />

                <!-- Top Right Cluster -->
                <line x1="90" y1="60" x2="110" y2="40" />
                <line x1="90" y1="60" x2="100" y2="35" />
                <line x1="100" y1="35" x2="120" y2="20" />
                <circle class="node" cx="110" cy="40" r="2" />
                <circle class="node" cx="100" cy="35" r="2" />
                <circle class="node" cx="120" cy="20" r="2" />

                <!-- Bottom Left Cluster -->
                <line x1="60" y1="90" x2="40" y2="110" />
                <line x1="60" y1="90" x2="50" y2="115" />
                <line x1="50" y1="115" x2="30" y2="130" />
                <circle class="node" cx="40" cy="110" r="2" />
                <circle class="node" cx="50" cy="115" r="2" />
                <circle class="node" cx="30" cy="130" r="2" />

                <!-- Bottom Right Cluster -->
                <line x1="90" y1="90" x2="110" y2="110" />
                <line x1="90" y1="90" x2="100" y2="115" />
                <line x1="100" y1="115" x2="120" y2="130" />
                <circle class="node" cx="110" cy="110" r="2" />
                <circle class="node" cx="100" cy="115" r="2" />
                <circle class="node" cx="120" cy="130" r="2" />

                <!-- Side Nodes -->
                <line x1="60" y1="75" x2="40" y2="75" />
                <line x1="90" y1="75" x2="110" y2="75" />
                <line x1="75" y1="60" x2="75" y2="40" />
                <line x1="75" y1="90" x2="75" y2="110" />
                <circle class="node" cx="40" cy="75" r="2" />
                <circle class="node" cx="110" cy="75" r="2" />
                <circle class="node" cx="75" cy="40" r="2" />
                <circle class="node" cx="75" cy="110" r="2" />

                <!-- Extra diagonal connections for mesh network -->
                <line x1="50" y1="35" x2="100" y2="35" />
                <line x1="50" y1="115" x2="100" y2="115" />
                <line x1="30" y1="20" x2="120" y2="20" />
                <line x1="30" y1="130" x2="120" y2="130" />
            </svg>
        </div>

        <h1>Jackal Systems</h1>

        <nav>
            <a href="codeforge.html">CodeForge</a>
            <a href="jackal-sec.html">Jackal Sec</a>
            <a href="standards.html">Standards</a>
        </nav>
    </div>
</body>

</html>
