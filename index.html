<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jackal Systems · Coding Standards</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐺</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #151b2b;
            --accent: #00d9ff;
            --accent-glow: rgba(0, 217, 255, 0.3);
            --text-primary: #e8edf4;
            --text-secondary: #8b94a8;
            --border: #1e2638;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.2;
            animation: gridMove 20s linear infinite;
            z-index: 0;
        }

        @keyframes gridMove {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(50px);
            }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
        }

        /* ===== TRIBAL VECTOR LOGO ===== */
        .logo-container {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .jackal-logo {
            width: 16rem;
            height: 16rem;
            filter: drop-shadow(0 0 15px var(--accent-glow));
        }

        /* Tech-side flicker */
        .tech-path {
            fill: var(--accent);
            animation: techPulse 4s infinite alternate;
        }

        @keyframes techPulse {
            0% {
                opacity: 0.8;
                filter: brightness(1);
            }

            100% {
                opacity: 1;
                filter: brightness(1.3) drop-shadow(0 0 5px var(--accent));
            }
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.3em;
        }

        nav ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-top: 3rem;
        }

        a {
            display: block;
            padding: 1.8rem 2.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-primary);
            font-size: 1.4rem;
            font-weight: 700;
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        a:hover {
            border-color: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
            transform: translateX(10px);
        }

        a span.index {
            opacity: 0.2;
            margin-right: 1.2rem;
            color: var(--text-secondary);
        }

        a:hover span.index {
            color: var(--accent);
            opacity: 1;
        }

        .accent-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), var(--accent), var(--border), transparent);
            margin-top: 4rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo-container">
                <svg class="jackal-logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <path d="M100,55 L70,5 C60,15 45,35 45,70 C45,85 55,95 65,100 L50,130 C60,140 80,165 100,185 
                             L100,165 C90,150 85,135 85,115 C85,105 90,95 100,90 Z" fill="#e8edf4" />

                    <path class="tech-path" d="M100,55 L130,5 C140,15 155,35 155,70 C155,85 145,95 135,100 L150,130 C140,140 120,165 100,185 
                             L100,165 C110,150 115,135 115,115 C115,105 110,95 100,90 Z" />

                    <path d="M75,85 Q85,82 92,92 L85,95 Z" fill="#0a0e17" />
                    <path d="M125,85 Q115,82 108,92 L115,95 Z" fill="#0a0e17" />

                    <path d="M70,30 Q80,45 85,65" fill="none" stroke="#0a0e17" stroke-width="3"
                        stroke-linecap="round" />
                    <path d="M130,30 Q120,45 115,65" fill="none" stroke="#0a0e17" stroke-width="3"
                        stroke-linecap="round" />
                </svg>
            </div>

            <h1>Jackal Systems</h1>
            <p class="subtitle">Precision . Security . Standards</p>
        </header>

        <nav>
            <ul>
                <li><a href="codeforge.html"><span class="index">01</span>CodeForge</a></li>
                <li><a href="jackal-sec.html"><span class="index">02</span>Jackal Sec</a></li>
                <li><a href="standards.html"><span class="index">03</span>Standards</a></li>
            </ul>
        </nav>

        <div class="accent-line"></div>
    </div>
</body>

</html>
