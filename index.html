<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Jackal Systems</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --text: #ffffff;
            --accent: #00d9ff;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: left;
            width: 400px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .logo {
            width: 80px;
            margin-bottom: 2rem;
            filter: invert(1);
            /* Ensures the black vector icon stands out on dark mode */
        }

        h1 {
            font-size: 2rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .tagline {
            color: var(--accent);
            font-size: 0.75rem;
            letter-spacing: 0.3em;
            margin-bottom: 3rem;
        }

        nav {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-item:hover {
            color: var(--accent);
            transform: translateX(10px);
        }

        .num {
            font-size: 0.7rem;
            margin-right: 1.5rem;
            opacity: 0.4;
        }

        .label {
            font-size: 1.1rem;
            font-weight: 300;
        }
    </style>
</head>

<body>
    <div class="container">
        <img src="http://googleusercontent.com/image_collection/image_retrieval/8788060986073928433_0" alt="Jackal Icon"
            class="logo">

        <h1>Jackal Systems</h1>
        <div class="tagline">PRECISION . SECURITY . STANDARDS</div>

        <nav>
            <div class="nav-item"><span class="num">01</span><span class="label">CodeForge</span></div>
            <div class="nav-item"><span class="num">02</span><span class="label">Jackal Sec</span></div>
            <div class="nav-item"><span class="num">03</span><span class="label">Standards</span></div>
        </nav>
    </div>
</body>

</html>
