<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jackal Systems · Coding Standards</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐺</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #151b2b;
            --accent: #00d9ff;
            --accent-glow: rgba(0, 217, 255, 0.3);
            --gold: #d97706;
            --text-primary: #e8edf4;
            --text-secondary: #8b94a8;
            --border: #1e2638;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.2;
            animation: gridMove 20s linear infinite;
            z-index: 0;
        }

        @keyframes gridMove {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(50px);
            }
        }

        /* Gradient orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: 0;
            animation: float 8s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--accent);
            top: -100px;
            right: -100px;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: #7000ff;
            bottom: -50px;
            left: -50px;
            animation-delay: 2s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(30px, -30px) scale(1.1);
            }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== LOGO CONTAINER ===== */
        .logo-container {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .jackal-logo {
            width: 18rem;
            height: 18rem;
            filter: drop-shadow(0 0 20px var(--accent-glow));
        }

        /* Glitch animation for the digital side */
        .cyber-side {
            animation: glitch 5s infinite;
        }

        @keyframes glitch {

            0%,
            95%,
            100% {
                transform: translate(0);
                opacity: 1;
            }

            96% {
                transform: translate(2px, -1px);
                opacity: 0.8;
            }

            97% {
                transform: translate(-2px, 1px);
                opacity: 0.9;
            }

            98% {
                transform: translate(1px, -2px);
                opacity: 0.8;
            }
        }

        .eye-pulse {
            animation: eyePulse 2s infinite alternate;
        }

        @keyframes eyePulse {
            from {
                opacity: 0.5;
                filter: drop-shadow(0 0 2px var(--accent));
            }

            to {
                opacity: 1;
                filter: drop-shadow(0 0 12px var(--accent));
            }
        }

        /* ===== HEADING & GRADIENT FIX ===== */
        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);

            /* Standard property + Vendor prefix for compatibility */
            -webkit-background-clip: text;
            background-clip: text;

            -webkit-text-fill-color: transparent;
            color: transparent;

            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 400;
        }

        /* ===== NAVIGATION ===== */
        nav {
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        a {
            display: block;
            padding: 2rem 2.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            font-weight: 700;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
            transition: left 0.5s;
        }

        a:hover::before {
            left: 100%;
        }

        a:hover {
            border-color: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
            transform: translateX(8px);
        }

        a span.index {
            opacity: 0.2;
            margin-right: 1.5rem;
            font-size: 2.5rem;
            transition: color 0.3s;
        }

        a:hover span.index {
            color: var(--accent);
            opacity: 0.6;
        }

        .accent-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            margin-top: 4rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.8rem;
            }

            .jackal-logo {
                width: 14rem;
                height: 14rem;
            }

            a {
                padding: 1.5rem;
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <header>
            <div class="logo-container">
                <svg class="jackal-logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="gradOrganic" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#fbbf24" />
                            <stop offset="100%" stop-color="#d97706" />
                        </linearGradient>

                        <linearGradient id="gradTech" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#00d9ff" />
                            <stop offset="100%" stop-color="#0066ff" />
                        </linearGradient>

                        <pattern id="binaryGrid" width="12" height="12" patternUnits="userSpaceOnUse">
                            <circle cx="2" cy="2" r="0.8" fill="rgba(0, 217, 255, 0.4)" />
                            <rect x="6" y="6" width="1" height="1" fill="rgba(255, 255, 255, 0.2)" />
                        </pattern>

                        <clipPath id="leftSide">
                            <rect x="0" y="0" width="100" height="200" />
                        </clipPath>
                        <clipPath id="rightSide">
                            <rect x="100" y="0" width="100" height="200" />
                        </clipPath>
                    </defs>

                    <g clip-path="url(#leftSide)">
                        <path d="M100,50 L35,5 L70,80 Z" fill="url(#gradOrganic)" />
                        <path d="M100,180 L55,100 L70,80 L100,50 Z" fill="#92400e" />
                        <path d="M100,180 L75,145 L55,100 Z" fill="#78350f" />
                        <path d="M78,95 L90,98 L86,106 Z" fill="#fff" opacity="0.9" />
                    </g>

                    <g clip-path="url(#rightSide)" class="cyber-side">
                        <path d="M100,50 L165,5 L130,80 Z" fill="url(#gradTech)" />
                        <path d="M100,180 L145,100 L130,80 L100,50 Z" fill="#0c4a6e" />
                        <path d="M100,50 L165,5 L145,100 L100,180 Z" fill="url(#binaryGrid)" />
                        <path d="M122,95 L110,98 L114,106 Z" fill="#00d9ff" class="eye-pulse" />
                    </g>

                    <path d="M96,180 L104,180 L100,186 Z" fill="#030712" />

                    <line x1="100" y1="50" x2="100" y2="180" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
                </svg>
            </div>

            <h1>Jackal Systems</h1>
            <p class="subtitle">Precision. Security. Standards.</p>
        </header>

        <nav>
            <ul>
                <li>
                    <a href="codeforge.html">
                        <span class="index">01</span>CodeForge
                    </a>
                </li>
                <li>
                    <a href="jackal-sec.html">
                        <span class="index">02</span>Jackal Sec
                    </a>
                </li>
                <li>
                    <a href="standards.html">
                        <span class="index">03</span>Standards
                    </a>
                </li>
            </ul>
        </nav>

        <div class="accent-line"></div>
    </div>
</body>

</html>
