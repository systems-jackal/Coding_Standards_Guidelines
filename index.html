<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jackal Systems · CPU Network</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg: #0a0e17;
            --accent-start: #9b00ff;
            --accent-end: #00f0ff;
            --glow: rgba(0, 240, 255, 0.3);
            --text-primary: #e8edf4;
            --border: #1e2638;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }

        .container {
            text-align: center;
        }

        /* CPU Logo Styling */
        .logo svg {
            width: 300px;
            height: 300px;
            filter: drop-shadow(0 0 20px var(--glow));
            transition: transform 0.5s ease;
        }

        /* Hardware Style Traces */
        .cpu-part {
            fill: none;
            stroke: url(#gradient);
            stroke-width: 1.5;
            stroke-linecap: square;
        }

        .data-lane {
            stroke-width: 2.5;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 700;
            margin-top: 1rem;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-end));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav {
            margin-top: 3rem;
        }

        a {
            display: block;
            padding: 1.2rem;
            margin: 1rem auto;
            width: 250px;
            border: 1px solid var(--border);
            border-radius: 4px;
            text-decoration: none;
            font-weight: 700;
            color: var(--text-primary);
            transition: 0.3s;
        }

        a:hover {
            border-color: var(--accent-end);
            box-shadow: 0 0 20px var(--glow);
            background: rgba(30, 30, 50, 0.5);
        }
    </style>
</head>

<body>

    <svg width="0" height="0">
        <defs>
            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#9b00ff" />
                <stop offset="100%" stop-color="#00f0ff" />
            </linearGradient>
        </defs>
    </svg>

    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 150 150">
                <rect class="cpu-part" x="35" y="35" width="80" height="80" rx="4" />

                <rect class="cpu-part" x="55" y="55" width="40" height="40" stroke-width="3" />

                <rect class="cpu-part" x="42" y="42" width="66" height="66" stroke-dasharray="2 6" opacity="0.6" />

                <line class="data-lane" x1="75" y1="35" x2="75" y2="10" />
                <line class="data-lane" x1="75" y1="115" x2="75" y2="140" />
                <line class="data-lane" x1="35" y1="75" x2="10" y2="75" />
                <line class="data-lane" x1="115" y1="75" x2="140" y2="75" />

                <circle cx="75" cy="10" r="3" />
                <circle cx="75" cy="140" r="3" />
                <circle cx="10" cy="75" r="3" />
                <circle cx="140" cy="75" r="3" />
            </svg>
        </div>

        <h1>Jackal Systems</h1>

        <nav>
            <a href="codeforge.html">CodeForge</a>
            <a href="jackal-sec.html">Jackal Sec</a>
            <a href="standards.html">Standards</a>
        </nav>
    </div>
</body>

</html>
