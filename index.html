<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jackal Systems · Coding Standards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #151b2b;
            --accent-start: #9b00ff;
            --accent-end: #00f0ff;
            --accent-glow: rgba(0, 240, 255, 0.3);
            --text-primary: #e8edf4;
            --text-secondary: #8b94a8;
            --border: #1e2638;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* Simplified Logo Styling */
        .jackal-logo svg {
            width: 200px;
            height: 200px;
            filter: drop-shadow(0 0 15px var(--accent-glow));
        }

        .jackal-logo path {
            fill: none;
            stroke: url(#gradient);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 3.5rem;
            margin-top: 1rem;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            text-align: center;
        }

        nav {
            margin-top: 3rem;
        }

        a {
            display: block;
            padding: 1.5rem;
            margin: 1rem 0;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        a:hover {
            border-color: var(--accent-end);
            background: var(--bg-secondary);
        }
    </style>
</head>

<body>
    <svg width="0" height="0">
        <defs>
            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#9b00ff" />
                <stop offset="100%" stop-color="#00f0ff" />
            </linearGradient>
        </defs>
    </svg>

    <div class="container">
        <div class="jackal-logo">
            <svg viewBox="0 0 100 100">
                <path d="M50 10 L30 40 L50 30 L70 40 L50 10 M30 40 L50 90 L70 40 M30 40 L50 60 L70 40" />
            </svg>
        </div>

        <h1>Jackal Systems</h1>

        <nav>
            <a href="codeforge.html">CodeForge</a>
            <a href="jackal-sec.html">Jackal Sec</a>
            <a href="standards.html">Standards</a>
        </nav>
    </div>
</body>

</html>
