<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jackal Systems · Coding Standards</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐺</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #151b2b;
            --accent: #00d9ff;
            --accent-glow: rgba(0, 217, 255, 0.3);
            --text-primary: #e8edf4;
            --text-secondary: #8b94a8;
            --border: #1e2638;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.3;
            animation: gridMove 20s linear infinite;
            z-index: 0;
        }

        @keyframes gridMove {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(50px);
            }
        }

        /* Gradient orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: 0;
            animation: float 8s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--accent);
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: #7000ff;
            bottom: -50px;
            left: -50px;
            animation-delay: 2s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(30px, -30px) scale(1.1);
            }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== LARGE, HIGH-FIDELITY JACKAL LOGO ABOVE HEADING ===== */
        .logo-container {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .jackal-logo {
            width: 20rem;
            /* Larger to fit the complex SVG */
            height: 20rem;
            filter: drop-shadow(0 0 30px var(--accent-glow));
        }

        /* Left side (gradient fur texture) */
        .jackal-logo .left-part {
            fill: url(#furGradient);
            stroke: none;
        }

        /* Right side (detailed binary pattern) */
        .jackal-logo .right-part {
            fill: url(#cyberDataPattern);
            stroke: none;
            animation: flicker 3s infinite;
        }

        /* Eyes get a detailed glow */
        .jackal-logo .eye {
            fill: url(#eyeRadialGradient);
            animation: eyeGlow 2s infinite alternate;
        }

        @keyframes eyeGlow {
            from {
                filter: drop-shadow(0 0 2px var(--accent));
            }

            to {
                filter: drop-shadow(0 0 8px var(--accent));
            }
        }

        @keyframes flicker {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }

            100% {
                opacity: 1;
            }
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 400;
        }

        nav {
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        a {
            display: block;
            padding: 2rem 2.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            font-weight: 700;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
            transition: left 0.5s;
        }

        a:hover::before {
            left: 100%;
        }

        a::after {
            content: '→';
            position: absolute;
            right: 2.5rem;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--accent);
            font-size: 2rem;
        }

        a:hover {
            border-color: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
            transform: translateX(8px);
        }

        a:hover::after {
            opacity: 1;
            right: 2rem;
        }

        a span.index {
            position: absolute;
            left: 2.5rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 3rem;
            font-weight: 700;
            color: var(--text-secondary);
            opacity: 0.2;
            transition: all 0.3s;
        }

        a:hover span.index {
            color: var(--accent);
            opacity: 0.5;
        }

        a span.text {
            display: inline-block;
            margin-left: 4rem;
        }

        .accent-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            margin-top: 4rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .jackal-logo {
                width: 14rem;
                height: 14rem;
            }

            a {
                padding: 1.5rem 1.5rem;
                font-size: 1.25rem;
            }

            a span.index {
                font-size: 2rem;
                left: 1.5rem;
            }

            a span.text {
                margin-left: 3rem;
            }

            a::after {
                right: 1.5rem;
                font-size: 1.5rem;
            }

            a:hover::after {
                right: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <header>
            <div class="logo-container">
                <svg class="jackal-logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="furGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#e8edf4" />
                            <stop offset="50%" stop-color="#70edf4" />
                            <stop offset="100%" stop-color="#00d9ff" />
                        </linearGradient>
                        <radialGradient id="eyeRadialGradient" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#fff" stop-opacity="0.8" />
                            <stop offset="100%" stop-color="#00d9ff" stop-opacity="0.2" />
                        </radialGradient>

                        <pattern id="cyberDataPattern" patternUnits="userSpaceOnUse" width="10" height="10"
                            patternTransform="scale(2)">
                            <rect width="10" height="10" fill="none" />
                            <circle cx="2" cy="2" r="0.5" fill="#00d9ff" />
                            <circle cx="8" cy="2" r="0.5" fill="#e8edf4" />
                            <circle cx="2" cy="8" r="0.5" fill="#e8edf4" />
                            <circle cx="8" cy="8" r="0.5" fill="#00d9ff" />
                            <rect x="4" y="4" width="2" height="2" fill="#00d9ff" fill-opacity="0.4" />
                        </pattern>

                        <clipPath id="rightHalfClip">
                            <rect x="100" y="0" width="100" height="200" />
                        </clipPath>
                    </defs>

                    <path d="M100,50 L95,5 L110,35 L120,40 L130,35 L145,5 L140,50 L125,70 L115,80 L100,85 Z"
                        fill="url(#furGradient)" opacity="0.6" clip-path="inset(0 100 0 0)" />
                    <path d="M100,50 L105,5 L90,35 L80,40 L70,35 L55,5 L60,50 L75,70 L85,80 L100,85 Z"
                        fill="url(#cyberDataPattern)" opacity="0.6" clip-path="url(#rightHalfClip)" />

                    <path d="M100,50 L95,5 L110,35 L120,40 L130,35 L145,5 L140,50 L125,70 L115,80 L100,85"
                        stroke="url(#furGradient)" stroke-width="0.5" fill="none" opacity="0.3"
                        clip-path="inset(0 100 0 0)" />

                    <path d="M100,50 L105,5 L90,35 L80,40 L70,35 L55,5 L60,50 L75,70 L85,80 L100,85"
                        stroke="url(#cyberDataPattern)" stroke-width="0.5" fill="none" opacity="0.3"
                        clip-path="url(#rightHalfClip)" />

                    <path d="M45,45 L55,25 L65,45" fill="url(#furGradient)" opacity="0.6"
                        clip-path="inset(0 100 0 0)" />
                    <path d="M115,45 L125,25 L135,45" fill="url(#cyberDataPattern)" opacity="0.6"
                        clip-path="url(#rightHalfClip)" />

                    <path d="M60,85 C55,85 55,95 60,95 S65,85 60,85 Z" class="eye" />
                    <path d="M140,85 C145,85 145,95 140,95 S135,85 140,85 Z" class="eye" />

                    <circle cx="70" cy="85" r="8" fill="none" stroke="#fff" stroke-opacity="0.2" />
                    <circle cx="70" cy="85" r="3" fill="#0a0e17" />
                    <circle cx="130" cy="85" r="8" fill="none" stroke="#fff" stroke-opacity="0.2" />
                    <circle cx="130" cy="85" r="3" fill="#0a0e17" />

                    <path
                        d="M100,120 C95,120 95,130 100,130 S105,120 100,120 M100,120 C98,122 98,128 100,128 S102,122 100,122 Z"
                        fill="url(#furGradient)" />
                </svg>
            </div>

            <h1>Jackal Systems</h1>
            <p class="subtitle">Coding Standards</p>
        </header>

        <nav>
            <ul>
                <li>
                    <a href="codeforge.html">
                        <span class="index">01</span>
                        <span class="text">CodeForge</span>
                    </a>
                </li>
                <li>
                    <a href="jackal-sec.html">
                        <span class="index">02</span>
                        <span class="text">Jackal Sec</span>
                    </a>
                </li>
                <li>
                    <a href="standards.html">
                        <span class="index">03</span>
                        <span class="text">Standards</span>
                    </a>
                </li>
            </ul>
        </nav>

        <div class="accent-line"></div>
    </div>
</body>

</html>
