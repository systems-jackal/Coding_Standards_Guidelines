<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jackal Systems · Minimal</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e17;
            --accent-start: #9b00ff;
            --accent-end: #00f0ff;
            --glow: rgba(0, 240, 255, 0.3);
        }

        body {
            margin: 0;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Syne', sans-serif;
        }

        .container {
            text-align: center;
        }

        .logo svg {
            width: 380px;
            height: 380px;
            filter: drop-shadow(0 0 20px var(--glow));
        }

        .jackal-outline {
            fill: none;
            stroke: url(#gradient);
            stroke-width: 1;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        h1 {
            font-size: 2.8rem;
            margin-top: 1rem;
            background: linear-gradient(135deg, #e8edf4, var(--accent-end));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav {
            margin-top: 2.5rem;
        }

        a {
            display: inline-block;
            margin: 0.5rem 1rem;
            padding: 0.8rem 2rem;
            border: 1px solid #1e2638;
            border-radius: 40px;
            text-decoration: none;
            color: #e8edf4;
            font-weight: 700;
            transition: 0.3s;
        }

        a:hover {
            border-color: var(--accent-end);
            box-shadow: 0 0 20px var(--glow);
            background: rgba(30, 30, 50, 0.5);
        }
    </style>
</head>

<body>
    <svg width="0" height="0">
        <defs>
            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#9b00ff" />
                <stop offset="100%" stop-color="#00f0ff" />
            </linearGradient>
        </defs>
    </svg>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 100 100">
                <path class="jackal-outline"
                    d="M25,35 L15,15 L30,25 Q50,15 70,25 L85,15 L75,35 Q70,55 50,60 Q30,55 25,35 Z" />
            </svg>
        </div>
        <h1>Jackal Systems</h1>
        <nav><a href="#">CodeForge</a><a href="#">Jackal Sec</a><a href="#">Standards</a></nav>
    </div>
</body>

</html>
