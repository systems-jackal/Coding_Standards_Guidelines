<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jackal Systems · Coding Standards</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐺</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #151b2b;
            --accent: #00d9ff;
            --accent-glow: rgba(0, 217, 255, 0.45);
            --text-primary: #e8edf4;
            --text-secondary: #8b94a8;
            --border: #1e2638;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.3;
            animation: gridMove 20s linear infinite;
            z-index: 0;
        }

        @keyframes gridMove {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(50px);
            }
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.18;
            z-index: 0;
            animation: float 8s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--accent);
            top: -100px;
            right: -100px;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: #7000ff;
            bottom: -50px;
            left: -50px;
            animation-delay: 2s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(30px, -30px) scale(1.1);
            }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .logo-container {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .jackal-logo {
            width: 18rem;
            height: 18rem;
            filter: drop-shadow(0 0 30px var(--accent-glow));
            animation: aura 4s ease-in-out infinite alternate;
        }

        @keyframes aura {
            from {
                filter: drop-shadow(0 0 15px var(--accent-glow));
            }

            to {
                filter: drop-shadow(0 0 60px var(--accent));
            }
        }

        .jackal-logo path {
            stroke: url(#gradient);
            stroke-width: 1.5;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .jackal-logo circle {
            fill: url(#gradient);
        }

        .eye-scan {
            stroke: url(#gradient);
            stroke-width: 2;
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% {
                transform: translateY(-3px);
            }

            50% {
                transform: translateY(3px);
            }

            100% {
                transform: translateY(-3px);
            }
        }

        .node {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.3;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.6);
            }
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        nav ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        a {
            display: block;
            padding: 2rem 2.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            font-weight: 700;
            transition: 0.3s;
        }

        a:hover {
            border-color: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
            transform: translateX(8px);
        }

        a span.index {
            opacity: 0.2;
            font-size: 3rem;
            margin-right: 1rem;
        }

        .accent-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            margin-top: 4rem;
        }
    </style>
</head>

<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <svg width="0" height="0">
        <defs>
            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#e8edf4" />
                <stop offset="100%" stop-color="#00d9ff" />
            </linearGradient>
        </defs>
    </svg>

    <div class="container">
        <header>
            <div class="logo-container">

                <svg class="jackal-logo" viewBox="0 0 150 150">
                    <!-- Polygonal symmetric jackal face -->
                    <!-- outer face triangles -->
                    <path d="M30 40 L50 10 L70 40 L60 70 L90 120 L60 115 L30 120 L40 70 Z" />
                    <path d="M70 40 L90 10 L110 40 L100 70 L120 120 L90 115 L60 120 L70 70 Z" />
                    <!-- snout polygon -->
                    <path d="M60 70 L75 85 L90 70 L75 75 Z" />
                    <!-- eyes -->
                    <circle cx="65" cy="55" r="3" />
                    <circle cx="95" cy="55" r="3" />
                    <line class="eye-scan" x1="63" y1="55" x2="97" y2="55" />
                    <!-- polygonal inner details -->
                    <path d="M65 55 L75 65 L85 55" />
                    <path d="M75 65 L75 75" />
                    <path d="M55 75 L95 75" />
                    <path d="M60 90 L90 90" />
                    <!-- circuit lines -->
                    <path d="M65 55 L40 60" />
                    <circle class="node" cx="38" cy="60" r="2" />
                    <path d="M95 55 L120 60" />
                    <circle class="node" cx="122" cy="60" r="2" />
                    <path d="M75 75 L75 100" />
                    <circle class="node" cx="75" cy="102" r="2" />
                </svg>

            </div>

            <h1>Jackal Systems</h1>
            <p class="subtitle">Precision · Security · Standards</p>
        </header>

        <nav>
            <ul>
                <li><a href="codeforge.html"><span class="index">01</span>CodeForge</a></li>
                <li><a href="jackal-sec.html"><span class="index">02</span>Jackal Sec</a></li>
                <li><a href="standards.html"><span class="index">03</span>Standards</a></li>
            </ul>
        </nav>

        <div class="accent-line"></div>
    </div>

</body>

</html>
