<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coding Standards</title>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg: #07070f;
            --panel: #0f0f1a;
            --border: #1c1c2b;
            --accent: #c8a96e;
            --green: #4caf50;
            --red: #d9534f;
            --amber: #c8a96e;
            --grey: #555;
            --text: #e8e8f0;
            --muted: #9aa0a6;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
        }

        h1,
        h2,
        h3 {
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 1px;
            margin: 0 0 10px 0;
        }

        code,
        .code {
            font-family: 'DM Mono', monospace;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        /* Top Bar */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: #0b0b14;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }

        .topbar-title {
            font-family: 'DM Mono', monospace;
            color: var(--accent);
            font-size: 18px;
        }

        .progress {
            font-size: 14px;
            color: var(--muted);
        }

        /* Layout */
        .container {
            display: flex;
            margin-top: 60px;
            height: calc(100vh - 60px);
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar h2 {
            font-size: 22px;
            margin-bottom: 10px;
        }

        .sidebar-stats {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 20px;
        }

        .topic-item {
            display: flex;
            align-items: center;
            padding: 8px 5px;
            cursor: pointer;
            border-radius: 4px;
        }

        .topic-item:hover {
            background: #1a1a2b;
        }

        .topic-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            background: var(--grey);
        }

        .topic-item.active {
            background: #161626;
        }

        /* Main Panel */
        .main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        /* Welcome */
        .welcome {
            max-width: 900px;
            margin: auto;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .category-card {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 8px;
        }

        .start-btn {
            margin-top: 30px;
            padding: 10px 20px;
            border: 1px solid var(--accent);
            background: transparent;
            color: var(--accent);
            cursor: pointer;
        }

        /* Lesson */
        .badge {
            display: inline-block;
            padding: 4px 8px;
            background: #1b1b2b;
            border: 1px solid var(--border);
            font-size: 12px;
            margin-bottom: 10px;
        }

        .section {
            margin-top: 25px;
        }

        .callout {
            padding: 12px;
            border-left: 4px solid var(--accent);
            background: #111120;
            margin: 15px 0;
        }

        .callout.tip {
            border-color: var(--green);
        }

        .callout.warning {
            border-color: var(--red);
        }

        .callout.info {
            border-color: var(--accent);
        }

        /* Code */
        pre {
            background: #0d0d17;
            padding: 15px;
            border: 1px solid var(--border);
            overflow-x: auto;
            border-radius: 6px;
        }

        .keyword {
            color: #ff7ab6;
        }

        .string {
            color: #8bd5ca;
        }

        .comment {
            color: #6c7086;
        }

        .type {
            color: #82aaff;
        }

        .func {
            color: #ffd866;
        }

        /* Comparison */
        .compare {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        .label-bad {
            color: var(--red);
            font-weight: bold;
        }

        .label-good {
            color: var(--green);
            font-weight: bold;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            border: 1px solid var(--border);
            padding: 8px;
            font-size: 14px;
        }

        th {
            background: #111120;
            text-align: left;
        }

        /* Quiz */
        .quiz {
            margin-top: 40px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .quiz-question {
            margin-bottom: 15px;
        }

        .quiz-option {
            border: 1px solid var(--border);
            padding: 8px;
            margin: 5px 0;
            cursor: pointer;
        }

        .quiz-option.correct {
            border-color: var(--green);
        }

        .quiz-option.wrong {
            border-color: var(--red);
        }

        .quiz-explanation {
            font-size: 13px;
            color: var(--muted);
            margin-top: 5px;
        }

        .nav-buttons {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="topbar-title">CODING GUIDEBOOK</div>
        <div class="progress" id="progressTracker"></div>
    </div>

    <div class="container">
        <div class="sidebar">
            <h2>Topics</h2>
            <div class="sidebar-stats" id="sidebarStats"></div>
            <div id="topicList"></div>
        </div>
        <div class="main" id="mainContent"></div>
    </div>

    <script>
        const PASS_THRESHOLD = 4;

        const topics = [
            { category: "Naming & Structure", title: "Naming Things Well", tagline: "Clarity over cleverness." },
            { category: "Naming & Structure", title: "Code Formatting", tagline: "Consistency reduces cognitive load." },
            { category: "Clean Code Principles", title: "Comments & Documentation", tagline: "Explain why, not what." },
            { category: "Clean Code Principles", title: "Error Handling", tagline: "Fail explicitly and safely." },
            { category: "Functions & Design", title: "Function Design", tagline: "Small, pure, predictable." },
            { category: "Functions & Design", title: "DRY Principle", tagline: "Eliminate duplication." },
            { category: "Testing & Quality", title: "Writing Tests", tagline: "Confidence through verification." },
            { category: "Testing & Quality", title: "Code Reviews", tagline: "Quality is a team sport." },
            { category: "Security & Performance", title: "Security Fundamentals", tagline: "Assume hostile input." },
            { category: "Security & Performance", title: "Performance Basics", tagline: "Measure before optimizing." },
            { category: "Tooling & Workflow", title: "Git & Version Control", tagline: "History is architecture." },
            { category: "Tooling & Workflow", title: "Writing READMEs", tagline: "Documentation is UX." },
            { category: "Professional Practice", title: "Refactoring", tagline: "Improve without changing behavior." },
            { category: "Professional Practice", title: "Language-Specific Best Practices", tagline: "Java, Rust, Python, JS, Go." }
        ];

        function loadState() {
            return JSON.parse(localStorage.getItem("jackal_standards") || "{}");
        }

        function saveState(state) {
            localStorage.setItem("jackal_standards", JSON.stringify(state));
        }

        function updateSidebar() {
            const topicList = document.getElementById("topicList");
            const state = loadState();
            topicList.innerHTML = "";
            let passed = 0;
            let totalPoints = 0;

            topics.forEach((t, i) => {
                const item = document.createElement("div");
                item.className = "topic-item";
                item.onclick = () => loadTopic(i);

                const dot = document.createElement("div");
                dot.className = "topic-dot";

                const result = state[i];
                if (result?.passed) {
                    dot.style.background = "var(--green)";
                    passed++;
                    totalPoints += result.score;
                } else if (result?.attempted) {
                    dot.style.background = "var(--amber)";
                    totalPoints += result.score || 0;
                }

                const text = document.createElement("div");
                text.textContent = (i + 1) + ". " + t.title;

                item.appendChild(dot);
                item.appendChild(text);
                topicList.appendChild(item);
            });

            document.getElementById("sidebarStats").textContent =
                `Passed: ${passed}/${topics.length} | Points: ${totalPoints}`;

            document.getElementById("progressTracker").textContent =
                `${passed} of ${topics.length} topics passed`;
        }

        function renderWelcome() {
            const main = document.getElementById("mainContent");
            main.innerHTML = `
    <div class="welcome">
      <h1>Software Engineering Standards</h1>
      <p>A structured interactive course covering modern engineering best practices across architecture, testing, security, tooling, and professional craft.</p>
      <div class="category-grid">
        ${[...new Set(topics.map(t => t.category))].map(c =>
                `<div class="category-card"><h3>${c}</h3></div>`
            ).join("")}
      </div>
      <button class="start-btn" onclick="loadTopic(0)">Start Reading</button>
    </div>
  `;
        }

        function loadTopic(index) {
            const t = topics[index];
            const main = document.getElementById("mainContent");

            main.innerHTML = `
    <div>
      <div class="badge">${t.category}</div>
      <h1>${index + 1}. ${t.title}</h1>
      <p><em>${t.tagline}</em></p>

      <div class="section">
        <h2>Core Principles</h2>
        <p>Strong engineering standards reduce entropy in large systems. Decisions should optimize maintainability, clarity, and safety.</p>
        <div class="callout info">Rule: Code is read more often than it is written.</div>
      </div>

      <div class="section">
        <h2>Example</h2>
        <div class="compare">
          <div>
            <div class="label-bad">BAD</div>
<pre><code><span class="keyword">function</span> <span class="func">x</span>(a,b){
<span class="keyword">return</span> a*b*0.07
}</code></pre>
          </div>
          <div>
            <div class="label-good">GOOD</div>
<pre><code><span class="keyword">function</span> <span class="func">calculateTax</span>(amount, taxRate) {
  <span class="keyword">return</span> amount * taxRate;
}</code></pre>
          </div>
        </div>
      </div>

      <div class="section">
        <h2>Reference Table</h2>
        <table>
          <tr><th>Language</th><th>Convention</th></tr>
          <tr><td>Java</td><td>camelCase methods</td></tr>
          <tr><td>Python</td><td>snake_case</td></tr>
          <tr><td>Go</td><td>MixedCaps</td></tr>
          <tr><td>Rust</td><td>snake_case functions</td></tr>
        </table>
      </div>

      <div class="quiz" id="quiz"></div>

      <div class="nav-buttons">
        <button onclick="prevTopic(${index})">Previous</button>
        <button onclick="nextTopic(${index})">Next</button>
      </div>
    </div>
  `;

            renderQuiz(index);
        }

        function prevTopic(i) {
            if (i > 0) loadTopic(i - 1);
        }

        function nextTopic(i) {
            if (i < topics.length - 1) loadTopic(i + 1);
        }

        function renderQuiz(topicIndex) {
            const quizEl = document.getElementById("quiz");
            const state = loadState();
            const existing = state[topicIndex];

            const questions = Array.from({ length: 5 }).map((_, i) => ({
                question: `Question ${i + 1}: What is a key principle?`,
                options: ["Clarity", "Obfuscation", "Magic numbers", "Hidden side effects"],
                correct: 0,
                explanation: "Clarity reduces cognitive overhead and defects."
            }));

            let score = 0;
            let answered = 0;

            quizEl.innerHTML = `<h2>Quiz</h2>`;

            questions.forEach((q, qi) => {
                const qDiv = document.createElement("div");
                qDiv.className = "quiz-question";
                qDiv.innerHTML = `<strong>${q.question}</strong>`;

                q.options.forEach((opt, oi) => {
                    const optDiv = document.createElement("div");
                    optDiv.className = "quiz-option";
                    optDiv.textContent = opt;

                    optDiv.onclick = () => {
                        if (optDiv.classList.contains("correct") || optDiv.classList.contains("wrong")) return;

                        answered++;
                        if (oi === q.correct) {
                            optDiv.classList.add("correct");
                            score++;
                        } else {
                            optDiv.classList.add("wrong");
                            qDiv.querySelectorAll(".quiz-option")[q.correct].classList.add("correct");
                        }

                        const exp = document.createElement("div");
                        exp.className = "quiz-explanation";
                        exp.textContent = q.explanation;
                        qDiv.appendChild(exp);

                        if (answered === questions.length) {
                            const passed = score >= PASS_THRESHOLD;
                            state[topicIndex] = { score, passed, attempted: true };
                            saveState(state);
                            updateSidebar();

                            const result = document.createElement("div");
                            result.innerHTML = `<h3>Score: ${score}/5 ${passed ? "(Passed)" : "(Failed)"}</h3>
          <button onclick="loadTopic(${topicIndex})">Retake</button>`;
                            quizEl.appendChild(result);
                        }
                    };

                    qDiv.appendChild(optDiv);
                });

                quizEl.appendChild(qDiv);
            });
        }

        updateSidebar();
        renderWelcome();
    </script>

</body>

</html>
